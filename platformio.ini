[env:esp32dev]
platform = espressif32@6.9.0   ; Specify the version of the platform (or the latest one that worked)
board = esp32dev
framework = arduino
monitor_speed = 115200
;monitor_filters = -e
board_build.partitions = no_ota.csv

; Enable C++17 so we can use structured bindings (auto [a,b]) and other modern C++ features
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -D USER_SETUP_LOADED
    -D ILI9341_2_DRIVER
    -D TFT_CS=15  ;**ok*
    -D TFT_RST=-1  ;**ok*
    -D TFT_DC=2  ; ESP32U (with Antenna);**ok*
   ;**ok* -D TFT_DC=5   ; ESP32 'Standard'
    -D TFT_MOSI=13 ;**ok*
    -D TFT_SCLK=14 ;**ok*
    -D TFT_BLP=27 ; backlight pin , can also be connected directly to 5V
    -D TOUCH_CS=33  ;**ok*
    -D TFT_MISO=4  ;**ok*
    -D TFT_BACKLIGHT_ON=HIGH
    ;-D LOAD_GLCD=1     ; 8x6 basic fixed-width font (fastest, always available)
    -D LOAD_FONT2      ; Small 16-pixel high sans serif font
    -D LOAD_FONT4      ; Medium 26-pixel high sans serif bold font
    ;-D LOAD_FONT6      ; Large 48-pixel high numerals (digits only)
    ;-D LOAD_FONT7      ; Very large 75-pixel high numerals (digits only)
    ;-D LOAD_FONT8      ; Huge 100-pixel high numerals (digits only)
    -D LOAD_GFXFF      ; Enable access to FreeFonts (stored in SPIFFS/PROGMEM)
    -D SPI_FREQUENCY=10000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D SPI_READ_FREQUENCY=16000000
extra_scripts = ./extra_script.py